<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete License | RGODBEAT</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
        }

        .license-container {
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid var(--color-accent);
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
        }

        .license-details {
            margin: 2rem 0;
            text-align: left;
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 4px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid #333;
            padding-bottom: 0.5rem;
        }

        .detail-label {
            color: #888;
        }

        .detail-value {
            color: #fff;
            font-weight: bold;
        }

        canvas {
            background: #fff;
            border: 2px dashed #888;
            cursor: crosshair;
            margin-bottom: 1rem;
            touch-action: none;
        }

        .signature-area h3 {
            color: var(--color-accent);
            margin-bottom: 1rem;
        }

        .clear-btn {
            background: #333;
            color: #fff;
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
            margin-bottom: 1rem;
        }

        .finish-btn {
            width: 100%;
            padding: 1rem;
            background: var(--color-accent);
            color: #000;
            border: none;
            font-family: var(--font-heading);
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        .finish-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .success-message {
            display: none;
            color: var(--color-accent);
            margin-top: 1rem;
        }
    </style>
</head>

<body>

    <div class="license-container">
        <h1>FINALIZE LICENSE</h1>
        <p>Please review your details and sign below to generate your contract.</p>

        <div class="license-details">
            <div class="detail-row">
                <span class="detail-label">Buyer Name:</span>
                <span class="detail-value" id="dispName">Loading...</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Beat:</span>
                <span class="detail-value" id="dispBeat">Loading...</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Price:</span>
                <span class="detail-value" id="dispPrice">Loading...</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Date:</span>
                <span class="detail-value" id="dispDate">Loading...</span>
            </div>
        </div>

        <div class="signature-area">
            <h3>DIGITAL SIGNATURE</h3>
            <canvas id="sigCanvas" width="500" height="200"></canvas>
            <br>
            <button class="clear-btn" onclick="clearCanvas()">Clear Signature</button>
        </div>

        <button class="finish-btn" onclick="submitContract()">GENERATE CONTRACT & DOWNLOAD</button>
        <p class="success-message" id="successMsg">Contract Sent! Check your email.</p>
    </div>

    <script>
        // 1. Load Data
        const orderData = JSON.parse(localStorage.getItem('pendingOrder'));
        if (!orderData) {
            alert('No pending order found. Redirecting to home.');
            window.location.href = 'index.html';
        }

        const today = new Date().toLocaleDateString();
        document.getElementById('dispName').textContent = orderData.name;
        document.getElementById('dispBeat').textContent = orderData.beatName;
        document.getElementById('dispPrice').textContent = '$' + orderData.price;
        document.getElementById('dispDate').textContent = today;

        // 2. Canvas Logic
        const canvas = document.getElementById('sigCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        // Mouse Events
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        // Touch Events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevent scrolling
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousedown', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousemove', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        });

        canvas.addEventListener('touchend', () => {
            const mouseEvent = new MouseEvent('mouseup', {});
            canvas.dispatchEvent(mouseEvent);
        });

        function startDrawing(e) {
            isDrawing = true;
            draw(e);
        }

        function draw(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#000';

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function stopDrawing() {
            isDrawing = false;
            ctx.beginPath();
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // 3. Submit Logic
        async function submitContract() {
            const signatureData = canvas.toDataURL('image/png');

            // Basic validation: check if canvas is empty (simplified)
            const blank = document.createElement('canvas');
            blank.width = canvas.width;
            blank.height = canvas.height;
            if (canvas.toDataURL() === blank.toDataURL()) {
                alert('Please sign the contract first.');
                return;
            }

            const btn = document.querySelector('.finish-btn');
            btn.textContent = 'GENERATING PDF...';
            btn.disabled = true;

            const payload = {
                ...orderData,
                signatureData,
                date: today
            };

            try {
                const response = await fetch('http://localhost:3000/api/sign-contract', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.success) {
                    document.getElementById('successMsg').style.display = 'block';
                    btn.textContent = 'CONTRACT SENT!';

                    // Simulate Download (In real app, backend returns download URL)
                    setTimeout(() => {
                        alert('Contract sent to ' + orderData.email + '. Downloading beat...');
                        // Trigger download logic here if needed
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    alert('Error: ' + result.error);
                    btn.disabled = false;
                    btn.textContent = 'TRY AGAIN';
                }
            } catch (error) {
                console.error(error);
                alert('Connection error');
                btn.disabled = false;
                btn.textContent = 'TRY AGAIN';
            }
        }
    </script>
</body>

</html>
